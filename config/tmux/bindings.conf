###
### Keybindings 
###

bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle # Begin selection in copy mode.

#bind splits and open them from current directory
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Reload tmux config
bind r source-file ~/.config/tmux/tmux.conf

# Move tmux windows
bind Left swap-window -t -1
bind Right swap-window -t +1

# Rebind rename session to `.` (next to `,` which is rename window).
bind . command-prompt -I "#S" "rename-session '%%'"

# Smart pane switching with awareness of Vim splits.
# Snippet from https://github.com/alexghergh/nvim-tmux-navigation?tab=readme-ov-file
# Also See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# smart navigation (prefix + hjkl)
bind h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
